  # DV_TEMPORAL (abstract): ["🕰️","📅","⏰","🗓️","🕒","⏳","⌛","🕘","🕛"],
  DV_DATE: ["d","📅","🗓","📆","🗓️","📇","🕰️"],
  DV_TIME: ["t","⌚","⏰","🕒","⏱️","🕓"],
  DV_DATE_TIME: ["dt","📅⌚","🕰️","📆🕒","🗓️🕒","🕘"],
  DV_DURATION: ["du","⏳","⌛","⏱️","↔️","🔁"],

  # DV_ENCAPSULATED (abstract): ["📦","🗃️","📦","🗄️","📥","📤","🧾"],
  DV_MULTIMEDIA: ["mu","📷","🖼️","🎥","🎧","📹","🎞️","📺","🔊"],
  DV_PARSABLE: ["pa","🔣","📄","🧾","💾","🗂️","🔍"],
  DV_URI: ["u","🔗","🌐","🔍","📎","📁","🧭","🌍"],
  DV_EHR_URI: ["eu","⤮","🩺🔗","🧾🔗","🏥🔗"],

