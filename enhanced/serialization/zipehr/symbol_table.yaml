  ATTESTATION: ["AT","✍"],
  GENERIC_ID: ["GX","🃏🆔"],
  INTERNET_ID: ["IX","🖧🆔"],
  HIER_OBJECT_ID: ["HX","🌳🆔","🔝🆔"],
  UUID: ["U", "🌌🆔"],
  INTERVAL: ["IV","⟷"],
  ISM_TRANSITION: ["IT","⏭","⏭️","➡️","🔁","↔️","🔀"],
  LINK: ["LK","⤭"], # note (U+292D) not same symbol as DV_EHR_URI: ⤮ (U+292E)

  ## ------------------------------------------------------------------------
